<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-purple-100 to-pink-100">
  <main class="max-w-7xl mx-auto p-6">
    <header class="flex justify-between items-center">
      <h1 class="text-3xl font-bold text-purple-800">Panel Administrador</h1>
      <button id="logoutAdmin" class="bg-purple-700 text-white px-4 py-2 rounded">Cerrar sesión</button>
    </header>

    <section class="mt-4 bg-white rounded-xl p-5 shadow">
      <h2 class="font-semibold text-lg">Siguiente cita</h2>
      <p id="adminNext">Cargando...</p>
      <p class="text-sm mt-1">Citas del día: <span id="adminTodayCount">0</span></p>
    </section>

    <section class="grid lg:grid-cols-3 gap-5 mt-6">
      <article class="bg-white rounded-xl p-4 shadow">
        <h3 class="font-semibold">Crear cita manual</h3>
        <form id="manualForm" class="space-y-2 mt-2 text-sm">
          <label class="block">
            <span class="text-slate-700">Cliente</span>
            <input id="clientSearch" list="clientMatches" placeholder="Escribe nombre, email o teléfono" class="w-full border rounded p-2" required>
          </label>
          <datalist id="clientMatches"></datalist>
          <select id="clientSelect" class="w-full border rounded p-2" required>
            <option value="">Selecciona una coincidencia</option>
          </select>

          <label class="block">
            <span class="text-slate-700">Servicio</span>
            <select id="servicioId" class="w-full border rounded p-2" required>
              <option value="">Selecciona un servicio</option>
            </select>
          </label>

          <input id="manualFecha" type="date" class="w-full border rounded p-2" required>
          <input id="manualHora" type="time" class="w-full border rounded p-2" required>
          <button class="bg-purple-700 text-white px-3 py-2 rounded w-full">Crear cita</button>
        </form>
      </article>

      <article class="bg-white rounded-xl p-4 shadow">
        <h3 class="font-semibold">Crear servicio</h3>
        <form id="serviceForm" class="space-y-2 mt-2 text-sm">
          <input id="nombreServicio" placeholder="Nombre" class="w-full border rounded p-2" required>
          <input id="duracionServicio" type="number" placeholder="Duración (min)" class="w-full border rounded p-2" required>
          <input id="precioServicio" type="number" step="0.01" placeholder="Precio" class="w-full border rounded p-2" required>
          <button class="bg-pink-400 text-white px-3 py-2 rounded w-full">Guardar servicio</button>
        </form>
      </article>

      <article class="bg-white rounded-xl p-4 shadow">
        <h3 class="font-semibold">Editar servicio</h3>
        <form id="editServiceForm" class="space-y-2 mt-2 text-sm">
          <input id="editServiceId" type="number" placeholder="ID servicio" class="w-full border rounded p-2" required>
          <input id="editNombre" placeholder="Nuevo nombre" class="w-full border rounded p-2">
          <input id="editDuracion" type="number" placeholder="Nueva duración" class="w-full border rounded p-2">
          <input id="editPrecio" type="number" step="0.01" placeholder="Nuevo precio" class="w-full border rounded p-2">
          <button class="bg-blue-500 text-white px-3 py-2 rounded w-full">Actualizar</button>
        </form>
      </article>
    </section>

    <section class="mt-6 bg-white rounded-xl p-5 shadow">
      <h2 class="text-xl font-semibold mb-3">Todas las citas</h2>
      <div class="overflow-auto">
        <table class="w-full text-sm">
          <thead><tr class="border-b"><th>ID</th><th>Cliente</th><th>Servicio</th><th>Fecha</th><th>Hora</th><th>Estado</th><th>Acción</th></tr></thead>
          <tbody id="adminAppointments"></tbody>
        </table>
      </div>
      <p id="adminMsg" class="mt-2 text-sm"></p>
    </section>
  </main>
  <script src="/static/admin.js"></script>
</body>
</html>
