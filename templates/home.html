<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Salón Belleza - Inicio</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            softBlue: '#9ec5fe',
            elegantPurple: '#7e57c2',
            pastelPink: '#f8bbd0'
          }
        }
      }
    }
  </script>
</head>
<body class="min-h-screen bg-gradient-to-br from-softBlue via-purple-100 to-pastelPink text-slate-800">
  <main class="max-w-5xl mx-auto p-6 md:p-10">
    <section class="text-center mb-8 animate-pulse">
      <img src="/static/logo.svg" alt="Logo salón" class="mx-auto h-28 w-28 rounded-full shadow-xl bg-white p-2" />
      <h1 class="mt-4 text-4xl font-bold text-elegantPurple">Tu momento de belleza</h1>
      <p class="mt-2 text-lg">Reserva citas en segundos y vive una experiencia premium.</p>
    </section>

    <section class="grid md:grid-cols-2 gap-6">
      <article class="bg-white/80 rounded-2xl p-6 shadow-lg backdrop-blur">
        <h2 class="text-2xl font-semibold mb-4 text-elegantPurple">Registro</h2>
        <form id="registerForm" class="space-y-3">
          <input name="nombre" placeholder="Nombre" class="w-full border rounded-lg p-3" required>
          <input name="telefono" placeholder="Teléfono" class="w-full border rounded-lg p-3" required>
          <input name="email" type="email" placeholder="Email" class="w-full border rounded-lg p-3" required>
          <input name="password" type="password" placeholder="Contraseña" class="w-full border rounded-lg p-3" required>
          <button class="w-full bg-elegantPurple text-white py-3 rounded-lg hover:opacity-90 transition">Crear cuenta</button>
        </form>
      </article>

      <article class="bg-white/80 rounded-2xl p-6 shadow-lg backdrop-blur">
        <h2 class="text-2xl font-semibold mb-4 text-elegantPurple">Iniciar sesión</h2>
        <form id="loginForm" class="space-y-3">
          <input name="identifier" placeholder="Email o teléfono" class="w-full border rounded-lg p-3" required>
          <input name="password" type="password" placeholder="Contraseña" class="w-full border rounded-lg p-3" required>
          <button class="w-full bg-pink-400 text-white py-3 rounded-lg hover:opacity-90 transition">Entrar</button>
        </form>
        <p class="text-sm mt-4">Si eres administradora, inicia sesión aquí y te redirigiremos automáticamente al panel de administración.</p>
        <a href="/admin" class="inline-block mt-3 text-sm px-4 py-2 rounded-lg bg-elegantPurple text-white hover:opacity-90 transition">Ir directamente al panel admin</a>
      </article>
    </section>
    <p id="message" class="mt-6 text-center font-medium"></p>
  </main>
  <script src="/static/home.js"></script>
</body>
</html>
